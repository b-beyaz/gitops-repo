apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesage
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubesage
  template:
    metadata:
      labels:
        app: kubesage
    spec:
      containers:
      - name: kubesage
        image: aysebeyaz/kubesage:ad8e49b
        ports:
        - containerPort: 8501
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: kubesage-secrets
              key: anthropic-api-key
