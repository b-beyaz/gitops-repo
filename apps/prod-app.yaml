apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubesage-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/b-beyaz/git-ops.git
    targetRevision: HEAD
    path: prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
